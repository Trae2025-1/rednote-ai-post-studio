<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-label="{{ALT_TEXT}}">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1A2340" flood-opacity="0.14"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1A2340" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="{{ACCENT_COLOR}}"/>
      <stop offset="100%" stop-color="{{ACCENT_COLOR_2}}"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1440" fill="{{PAGE_BG}}"/>
  <rect x="42" y="42" width="996" height="1356" rx="50" fill="{{CARD_BG}}" filter="url(#cardShadow)"/>

  <g id="corner-marks" fill="none" stroke="{{ACCENT_COLOR}}" stroke-linecap="round" stroke-width="8" opacity="0.92">
    <path d="M96 112 L62 146 L96 180"/>
    <path d="M136 112 L102 146 L136 180"/>
    <path d="M176 112 L142 146 L176 180"/>
    <path d="M884 144 H894"/>
    <path d="M924 144 H934"/>
    <path d="M964 144 H974"/>
    <path d="M1004 144 H1014"/>
  </g>

  <g id="top-label">
    <rect x="357" y="190" width="366" height="74" rx="24" fill="{{ACCENT_COLOR}}"/>
    <text x="540" y="242" text-anchor="middle" font-family="{{FONT_CN}}" font-size="42" font-weight="800" fill="#FFFFFF">{{TOP_LABEL}}</text>
    <g fill="none" stroke="{{ACCENT_COLOR}}" stroke-linecap="round" stroke-width="7">
      <path d="M306 218 L276 204"/>
      <path d="M306 238 L268 238"/>
      <path d="M306 258 L276 272"/>
      <path d="M774 218 L804 204"/>
      <path d="M774 238 L812 238"/>
      <path d="M774 258 L804 272"/>
    </g>
  </g>

  <g id="headline" text-anchor="middle">
    <text x="540" y="412" font-family="{{FONT_EN}}" font-size="134" font-weight="900" fill="url(#accentGradient)">{{TOOL_NAME}}</text>
    <text x="540" y="528" font-family="{{FONT_CN}}" font-size="72" font-weight="900" fill="#080B12">{{TITLE_LINE_1}}</text>
    <text x="540" y="626" font-family="{{FONT_CN}}" font-size="72" font-weight="900" fill="{{ACCENT_COLOR}}">{{TITLE_LINE_2}}</text>
    <path d="M338 666 C440 690, 648 690, 742 666" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g id="benefits" font-family="{{FONT_CN}}" font-size="34" font-weight="800" fill="#10131A">
    <g transform="translate(176 724)">
      <circle cx="0" cy="0" r="18" fill="{{ACCENT_COLOR}}"/>
      <path d="M-8 -1 L-2 7 L10 -9" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="12">{{BENEFIT_1}}</text>
    </g>
    <path d="M360 704 V748" stroke="#CBD1DB" stroke-width="2"/>
    <g transform="translate(438 724)">
      <circle cx="0" cy="0" r="18" fill="{{ACCENT_COLOR}}"/>
      <path d="M-8 -1 L-2 7 L10 -9" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="12">{{BENEFIT_2}}</text>
    </g>
    <path d="M622 704 V748" stroke="#CBD1DB" stroke-width="2"/>
    <g transform="translate(700 724)">
      <circle cx="0" cy="0" r="18" fill="{{ACCENT_COLOR}}"/>
      <path d="M-8 -1 L-2 7 L10 -9" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="12">{{BENEFIT_3}}</text>
    </g>
  </g>

  <g id="logo-hero" filter="url(#softShadow)">
    <circle cx="540" cy="968" r="182" fill="#FFFFFF"/>
    <image x="374" y="802" width="332" height="332" href="{{LOGO_1_HREF}}" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g id="bottom-cta">
    <rect x="236" y="1238" width="608" height="82" rx="41" fill="{{ACCENT_COLOR}}"/>
    <text x="540" y="1293" text-anchor="middle" font-family="{{FONT_CN}}" font-size="40" font-weight="900" fill="#FFFFFF">{{CTA}}</text>
    <g fill="none" stroke="{{ACCENT_COLOR}}" stroke-linecap="round" stroke-width="7">
      <path d="M188 1262 L160 1248"/>
      <path d="M188 1282 L152 1282"/>
      <path d="M188 1302 L160 1316"/>
      <path d="M892 1262 L920 1248"/>
      <path d="M892 1282 L928 1282"/>
      <path d="M892 1302 L920 1316"/>
    </g>
  </g>
</svg>
